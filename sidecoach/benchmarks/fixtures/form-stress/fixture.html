<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Intake form</title>
  <link rel="stylesheet" href="fixture.css">
</head>
<body>
  <main>
    <h1>Eligibility intake</h1>
    <form aria-describedby="error-summary">
      <div class="error-summary" id="error-summary" role="alert" hidden>
        There are problems with your submission.
      </div>
      <div>
        <label for="full-name">Full name</label>
        <input id="full-name" name="fullName" type="text" autocomplete="name" required>
        <p class="help-text" id="full-name-help">Enter your full legal name.</p>
      </div>
      <div>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <button class="submit" type="submit">Submit application</button>
    </form>
  </main>
</body>
</html>
